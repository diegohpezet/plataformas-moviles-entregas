    <link rel="icon" type="image/x-icon" href="img/favicon.ico">

    <div id="container">
      <div id="region-selector" class="btn-group m-3 d-flex" role="group">

        <button type="button" class="btn btn-primary" onclick="regionSelector(2)">Hoenn</button>

      <div id="poke-container" class="row d-flex justify-content-center">
        <!-- Will hold the cards for all the pokemon -->
      </div>
    </div>
